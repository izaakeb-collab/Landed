# Netlify configuration for LANDED
[build]
  publish = "."
  functions = "netlify/functions"

# Pretty endpoints: /api/* -> serverless functions
[[redirects]]
  from = "/api/fx"
  to = "/.netlify/functions/fx"
  status = 200

[[redirects]]
  from = "/api/prices"
  to = "/.netlify/functions/prices"
  status = 200
